name: Daily Weather Bot

on:
  schedule:
    - cron: '0 22 * * *'  # 한국 시간 매일 오전 8시 (UTC 23:00)
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 파일 저장 권한 부여
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          REST_API_KEY: ${{ secrets.REST_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          AUTH_CODE: ${{ secrets.AUTH_CODE }}
        run: python weather.py

      - name: Commit and Push tokens
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kakao_tokens.json || echo "No file to add"
          git commit -m "Update tokens" || echo "No changes to commit"
          git push
